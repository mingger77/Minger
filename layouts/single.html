{{ define "main" }}
<article class="page-post">
  <div class="post-bg-wrap">
    <header class="post-header">
      <h1 class="post-title">{{ .Title }}</h1>
      <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
